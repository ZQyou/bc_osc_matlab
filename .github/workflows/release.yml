name: Create release on tag push
on:
  push:
    tags:
      - 'v*' # Triggers only when a tag like v1.0.0 is pushed 
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Ensures all history is fetched for note generation

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" --target master --generate-notes
